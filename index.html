<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance | Company Name</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --text-color: #1f2937;
            --bg-gradient: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #111827;
        }

        p {
            line-height: 1.6;
            margin-bottom: 2rem;
            color: #4b5563;
        }

        .status-badge {
            display: inline-block;
            background: #dbeafe;
            color: var(--primary-color);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .contact-info {
            border-top: 1px solid #e5e7eb;
            padding-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .contact-info a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .container { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">LOGO</div>
        <div class="status-badge">System Upgrade in Progress</div>
        <h1>We’ll be back soon!</h1>
        <p>
            We are currently performing scheduled maintenance to improve our services. 
            We apologize for the inconvenience and expect to be back online shortly.
        </p>
        
        <div class="contact-info">
            <a href="mailto:support@company.com">Email Support</a>
            <a href="#">Twitter/X Status</a>
        </div>
    </div>

</body>
</html>
